<!DOCTYPE html>
<html lang="es">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon" />
      <title>Examen API Canvas</title>
      <style>
            /* Reseteamos márgenes para que ocupe toda la pantalla sin barras de desplazamiento */
            body {
                  margin: 0;
                  padding: 0;
                  display: flex;
                  height: 100vh;
                  width: 100vw;
                  overflow: hidden;
            }

        /* Contenedor izquierdo: 50% para el Canvas */
        #contenedor-canvas {
            width: 50%;
            height: 100%;
            background-color: #f4f4f9; /* Color de fondo sutil para distinguir el área */
        }

        /* Contenedor derecho: 50% para la Imagen */
        #contenedor-imagen {
            width: 50%;
            height: 100%;
        }

        /* Aseguramos que la imagen cubra todo su contenedor sin deformarse */
        #contenedor-imagen img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* Quitamos el espacio extra que los canvas a veces generan por defecto */
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    
    <div id="contenedor-canvas">
        <canvas id="miCanvas"></canvas>
    </div>

    <div id="contenedor-imagen">
        <img src="./assets/img/imagen.png" alt="Imagen de referencia">
    </div>

    <script src="./assets/js/main.js"></script>
</body>
</html>
