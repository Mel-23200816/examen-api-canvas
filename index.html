<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon" />
    <title>Examen API Canvas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="bg-light d-flex flex-column vh-100">

    <header class="bg-primary text-white text-center py-3 shadow-sm">
        <h1 class="display-6 fw-semibold mb-0">Examen API Canvas</h1>
    </header>

    <main class="container-fluid flex-grow-1 p-4 d-flex">
        <div class="row w-100 g-4 m-0">
            
            <div class="col-12 col-md-6 d-flex flex-column">
                <div class="card shadow-sm border-0 rounded-4 flex-grow-1 overflow-hidden">
                    <div class="card-body p-0 d-flex" id="contenedor-canvas">
                        <canvas id="miCanvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 d-flex flex-column">
                <div class="card shadow-sm border-0 rounded-4 flex-grow-1 overflow-hidden bg-dark">
                    <img src="./assets/img/imagen.png" alt="Imagen de referencia" class="imagen-cobertura">
                </div>
            </div>

        </div>
    </main>

    <script src="./assets/js/main.js"></script>
</body>
</html>
